services:
  - type: web
    name: aolined-personal-scenes
    runtime: node
    plan: free
    buildCommand: npm run check
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ECHO_MUSIC_PUBLIC_URL
        value: "https://aolined-echo-music.onrender.com"
  - type: web
    name: aolined-format-workshop
    runtime: static
    rootDir: format-workshop
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: aolined-echo-music
    runtime: node
    plan: free
    rootDir: echo-music
    buildCommand: npm ci --omit=dev && npm test
    startCommand: npm run web
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_GUEST_MODE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
